<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send an anonymous message</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header" id="siteHeader">
  <div class="header-inner">
    <a href="index.html" class="header-logo">NGL's</a>
    <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="17" x2="20" y2="17"></line></svg>
    </button>
  </div>
  <nav class="header-menu" id="headerMenu">
    <a href="https://tmenshs.github.io/AnonApp/inbox.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"></path><path d="M5 10v10h14V10"></path></svg>
      Inbox
    </a>
    <a href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Create your link
    </a>
  </nav>
</header>
<div class="wrap">
  <div class="brand">
    <div class="mark">NGL's</div>
    <h1 id="pageTitle">Send an anonymous message</h1>
  </div>
  <div class="card">
    <div class="anon-badge"><span class="dot"></span> Stay unseen, stay authentic.</div>
    <p class="subtitle" id="subtitle">Loading...</p>
    <textarea id="content" placeholder="Say what's on your mind..." maxlength="500"></textarea>
    <button id="sendBtn">Send anonymously</button>
    <div class="msg" id="statusMsg"></div>
  </div>
  <div class="footer-links">
    Want your own link? <a href="index.html">Create one</a>
  </div>
</div>
<script src="config.js"></script>
<script>
const menuToggle = document.getElementById('menuToggle');
const headerMenu = document.getElementById('headerMenu');
menuToggle.addEventListener('click', () => {
  menuToggle.classList.toggle('open');
  headerMenu.classList.toggle('open');
});
const params = new URLSearchParams(window.location.search);
const recipientId = params.get('to');
const subtitle = document.getElementById('subtitle');
const statusMsg = document.getElementById('statusMsg');
const sendBtn = document.getElementById('sendBtn');
function showMsg(text, type) {
  statusMsg.textContent = text;
  statusMsg.className = 'msg show ' + type;
}
if (!recipientId) {
  subtitle.textContent = 'This link is missing a recipient. Ask for a valid link.';
  sendBtn.disabled = true;
} else {
  const session = getSession();
  if (!session) {
    subtitle.textContent = 'Log in to send this message (so we know who sent it — they still won\'t see your name).';
    sendBtn.textContent = 'Log in to send';
    sendBtn.addEventListener('click', () => {
      window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.pathname.split('/').pop() + window.location.search);
    });
  } else {
    subtitle.textContent = 'Sending as: logged in (your name stays hidden from the recipient).';
    sendBtn.addEventListener('click', async () => {
      const content = document.getElementById('content').value.trim();
      if (!content) {
        showMsg('Write something before sending.', 'err');
        return;
      }
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending...';
      try {
        const result = await callApi({
          action: 'send',
          senderId: session.userId,
          recipientId: recipientId,
          content: content
        });
        if (result.success) {
          showMsg('Message sent — anonymously delivered.', 'ok');
          document.getElementById('content').value = '';
        } else {
          showMsg(result.message || 'Could not send message.', 'err');
        }
      } catch (err) {
        showMsg('Could not reach the server. Check your connection.', 'err');
      }
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send anonymously';
    });
  }
}
</script>
</body>
</html>

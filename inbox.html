<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your inbox — AnonXyle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="emoji-bg" aria-hidden="true">
  <span style="left:5%; animation-duration:14s; animation-delay:0s;">😄</span>
  <span style="left:15%; animation-duration:18s; animation-delay:2s;">😂</span>
  <span style="left:25%; animation-duration:12s; animation-delay:4s;">😊</span>
  <span style="left:35%; animation-duration:16s; animation-delay:1s;">⚡</span>
  <span style="left:45%; animation-duration:20s; animation-delay:3s;">😌</span>
  <span style="left:55%; animation-duration:13s; animation-delay:5s;">😅</span>
  <span style="left:65%; animation-duration:17s; animation-delay:2.5s;">😴</span>
  <span style="left:75%; animation-duration:15s; animation-delay:0.5s;">😉</span>
  <span style="left:85%; animation-duration:19s; animation-delay:3.5s;">😎</span>
  <span style="left:10%; animation-duration:22s; animation-delay:6s;">😍</span>
  <span style="left:30%; animation-duration:14s; animation-delay:7s;">😜</span>
  <span style="left:50%; animation-duration:18s; animation-delay:8s;">🥰</span>
  <span style="left:70%; animation-duration:16s; animation-delay:9s;">😢</span>
  <span style="left:90%; animation-duration:21s; animation-delay:5.5s;">🥰</span>
</div>
<header class="site-header" id="siteHeader">
  <div class="header-inner">
    <a href="index.html" class="header-logo">NGL's</a>
    <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="17" x2="20" y2="17"></line></svg>
    </button>
  </div>
  <nav class="header-menu" id="headerMenu">
    <a href="https://tmenshs.github.io/AnonApp/send.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      Send a message
    </a>
    <a href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Create your link
    </a>
  </nav>
</header>

<div class="wrap">
  <div class="brand">
    <div class="mark">NGL's</div>
    <h1>Your inbox</h1>
  </div>
  <div class="card" id="loggedOutCard" style="display:none;">
    <p class="subtitle">Log in to see your messages.</p>
    <button onclick="window.location.href='login.html?redirect=inbox.html'">Log in</button>
  </div>
  <div id="loggedInView" style="display:none;">
    <div class="card">
      <div class="link-row">
        <input id="linkOutput" type="text" readonly>
        <button id="copyBtn" class="secondary">Copy link</button>
      </div>
    </div>
    <div class="card" style="margin-top:16px;">
      <div id="inboxList" class="inbox-list">
        <div class="empty-state">Loading your messages...</div>
      </div>
    </div>
    <div class="footer-links">
      <a href="#" id="logoutLink">Log out</a>
    </div>
  </div>
</div>
<script src="config.js"></script>
<script>
const menuToggle = document.getElementById('menuToggle');
const headerMenu = document.getElementById('headerMenu');
menuToggle.addEventListener('click', () => {
  menuToggle.classList.toggle('open');
  headerMenu.classList.toggle('open');
});

const session = getSession();
if (!session) {
  document.getElementById('loggedOutCard').style.display = 'block';
} else {
  document.getElementById('loggedInView').style.display = 'block';
  const personalLink = window.location.origin + window.location.pathname.replace('inbox.html', '') + 'send.html?to=' + session.userId;
  document.getElementById('linkOutput').value = personalLink;
  document.getElementById('copyBtn').addEventListener('click', () => {
    const input = document.getElementById('linkOutput');
    input.select();
    navigator.clipboard.writeText(input.value);
    const btn = document.getElementById('copyBtn');
    const original = btn.textContent;
    btn.textContent = 'Copied';
    setTimeout(() => btn.textContent = original, 1500);
  });
  document.getElementById('logoutLink').addEventListener('click', (e) => {
    e.preventDefault();
    clearSession();
    window.location.href = 'login.html';
  });

  async function loadInbox() {
    const listEl = document.getElementById('inboxList');
    try {
      const result = await callApi({ action: 'inbox', userId: session.userId });
      if (result.success && result.messages.length > 0) {
        listEl.innerHTML = result.messages.map(m => renderBubble(m)).join('');
        attachReplyHandlers();
      } else if (result.success) {
        listEl.innerHTML = '<div class="empty-state">No messages yet. Share your link to start receiving anonymous messages.</div>';
      } else {
        listEl.innerHTML = '<div class="empty-state">Could not load your inbox.</div>';
      }
    } catch (err) {
      listEl.innerHTML = '<div class="empty-state">Could not reach the server.</div>';
    }
  }

  function renderBubble(m) {
    const hasReply = m.reply && m.reply.trim().length > 0;
    return `
      <div class="bubble" data-message-id="${m.id}">
        ${escapeHtml(m.content)}
        <span class="time">${formatDate(m.createdAt)}</span>

        ${hasReply ? `
          <div class="reply-block">
            <span class="reply-label">Your reply</span>
            <div class="reply-text">${escapeHtml(m.reply)}</div>
          </div>
        ` : `
          <div class="reply-form" data-message-id="${m.id}">
            <textarea class="reply-input" placeholder="Write a reply..." maxlength="500"></textarea>
            <button class="reply-btn secondary">Reply</button>
            <div class="reply-status"></div>
          </div>
        `}
      </div>
    `;
  }

  function attachReplyHandlers() {
    document.querySelectorAll('.reply-form').forEach(form => {
      const messageId = form.getAttribute('data-message-id');
      const btn = form.querySelector('.reply-btn');
      const input = form.querySelector('.reply-input');
      const status = form.querySelector('.reply-status');

      btn.addEventListener('click', async () => {
        const content = input.value.trim();
        if (!content) {
          status.textContent = 'Write something before sending.';
          status.className = 'reply-status show err';
          return;
        }
        btn.disabled = true;
        btn.textContent = 'Sending...';
        try {
          const result = await callApi({
            action: 'reply',
            userId: session.userId,
            messageId: messageId,
            content: content
          });
          if (result.success) {
            const bubble = form.closest('.bubble');
            form.outerHTML = `
              <div class="reply-block">
                <span class="reply-label">Your reply</span>
                <div class="reply-text">${escapeHtml(content)}</div>
              </div>
            `;
          } else {
            status.textContent = result.message || 'Could not send reply.';
            status.className = 'reply-status show err';
            btn.disabled = false;
            btn.textContent = 'Reply';
          }
        } catch (err) {
          status.textContent = 'Could not reach the server.';
          status.className = 'reply-status show err';
          btn.disabled = false;
          btn.textContent = 'Reply';
        }
      });
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
  function formatDate(raw) {
    try {
      const d = new Date(raw);
      return d.toLocaleString();
    } catch (e) {
      return '';
    }
  }
  loadInbox();
}
</script>
</body>
</html>
